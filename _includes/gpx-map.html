<div class="gpx-map-container">
  <div id="gpx-map-{{ include.id | default: '1' }}" class="gpx-map"></div>
  {% if include.caption %}
  <p class="gpx-caption">{{ include.caption }}</p>
  {% endif %}
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var mapId = 'gpx-map-{{ include.id | default: "1" }}';
  var map = L.map(mapId, { scrollWheelZoom: false });

  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom: 17,
    attribution: 'Map data &copy; OpenStreetMap contributors, SRTM | Map style &copy; OpenTopoMap'
  }).addTo(map);

  new L.GPX('{{ include.file }}', {
    async: true,
    marker_options: {
      startIconUrl: null,
      endIconUrl: null,
      shadowUrl: null,
      wptIconUrls: { '': null }
    },
    polyline_options: {
      color: '#e85d26',
      weight: 4,
      opacity: 0.85,
      lineCap: 'round'
    }
  }).on('loaded', function(e) {
    map.fitBounds(e.target.getBounds(), { padding: [30, 30] });

    var gpx = e.target;
    var dist = (gpx.get_distance() / 1000).toFixed(1);
    var elevGain = gpx.get_elevation_gain().toFixed(0);
    var elevLoss = gpx.get_elevation_loss().toFixed(0);

    var statsHtml = '<div class="gpx-stats">' +
      '<span><strong>' + dist + '</strong> km</span>' +
      '<span><strong>' + elevGain + '</strong> m gain</span>' +
      '<span><strong>' + elevLoss + '</strong> m loss</span>' +
      '</div>';

    document.getElementById(mapId).insertAdjacentHTML('afterend', statsHtml);
  }).addTo(map);
});
</script>
