<div class="share-section">
  <span class="share-label">Share this post:</span>
  <div class="share-buttons">
    <button class="share-btn copy-link" onclick="copyToClipboard()" title="Copy link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="share-text">Copy link</span>
    </button>
    <a class="share-btn twitter" href="https://twitter.com/intent/tweet?url={{ site.url }}{{ page.url | url_encode }}&text={{ page.title | url_encode }}" target="_blank" rel="noopener" title="Share on X">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      <span class="share-text">X</span>
    </a>
    <a class="share-btn facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url | url_encode }}" target="_blank" rel="noopener" title="Share on Facebook">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      <span class="share-text">Facebook</span>
    </a>
    <a class="share-btn email" href="mailto:?subject={{ page.title | url_encode }}&body=Check out this post: {{ site.url }}{{ page.url }}" title="Share via Email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <span class="share-text">Email</span>
    </a>
  </div>
</div>

<style>
.share-section {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.share-label {
  font-family: 'Lora', serif;
  color: #666;
  font-size: 0.95rem;
}

.share-buttons {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 0.85rem;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 500;
  text-decoration: none;
  border: 1px solid #ddd;
  background: #fff;
  color: #555;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: 'Inter', sans-serif;
}

.share-btn:hover {
  border-color: #bbb;
  background: #f9f9f9;
}

.share-btn svg {
  width: 16px;
  height: 16px;
}

.share-btn.copy-link:hover {
  border-color: var(--accent, #2d5a27);
  color: var(--accent, #2d5a27);
}

.share-btn.twitter:hover {
  border-color: #000;
  color: #000;
}

.share-btn.facebook:hover {
  border-color: #1877f2;
  color: #1877f2;
}

.share-btn.email:hover {
  border-color: #666;
  color: #444;
}

.share-btn.copied {
  border-color: var(--accent, #2d5a27);
  background: var(--accent, #2d5a27);
  color: white;
}

@media (max-width: 480px) {
  .share-text {
    display: none;
  }
  .share-btn {
    padding: 0.6rem;
  }
  .share-btn svg {
    width: 18px;
    height: 18px;
  }
}
</style>

<script>
function copyToClipboard() {
  var url = window.location.href;
  navigator.clipboard.writeText(url).then(function() {
    var btn = document.querySelector('.share-btn.copy-link');
    var originalText = btn.querySelector('.share-text').textContent;
    btn.classList.add('copied');
    btn.querySelector('.share-text').textContent = 'Copied!';
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.querySelector('.share-text').textContent = originalText;
    }, 2000);
  });
}
</script>
