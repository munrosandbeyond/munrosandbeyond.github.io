<div class="route-map-section">
  <h3 class="route-map-title">The Route</h3>
  <div id="route-map" class="route-map"></div>
  <div class="route-legend">
    <span class="route-legend-item"><span class="route-legend-line day1"></span> Day 1: Night Hike</span>
    <span class="route-legend-item"><span class="route-legend-line day2"></span> Day 2: Grey Corries & Aonachs</span>
    <span class="route-legend-item"><span class="route-legend-line day3"></span> Day 3: Morning Walk</span>
    <span class="route-legend-item"><span class="route-legend-dot camp"></span> Bivvy</span>
  </div>
  <div class="elevation-section">
    <h4 class="elevation-title">Elevation Profile</h4>
    <canvas id="elevation-chart" class="elevation-chart"></canvas>
  </div>
  <div class="route-stats-bar">
    <div class="route-stat"><span class="route-stat-value" id="total-dist">--</span><span class="route-stat-label">Total km</span></div>
    <div class="route-stat"><span class="route-stat-value" id="max-elev">--</span><span class="route-stat-label">Max Elevation</span></div>
    <div class="route-stat"><span class="route-stat-value" id="total-gain">--</span><span class="route-stat-label">Total Ascent</span></div>
    <div class="route-stat"><span class="route-stat-value">3</span><span class="route-stat-label">Days</span></div>
  </div>
</div>

<script>
(function() {
  var dayColors = ['#9b59b6', '#e8555a', '#5bb563'];
  var dayFiles = [
    '/assets/gpx/solstice_day1_night_hike.gpx',
    '/assets/gpx/solstice_day2_grey_corries_aonachs.gpx',
    '/assets/gpx/solstice_day3_morning_hike.gpx'
  ];

  var bivvy = {lat: 56.7894, lng: -4.6600, label: 'Bivvy spot', elev: '937m'};

  var map = L.map('route-map', {scrollWheelZoom: false}).setView([56.81, -4.85], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);

  var dayData = [null, null, null];
  var loadedCount = 0;
  var bounds = L.latLngBounds();

  function haversine(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function parseGPX(xml) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(xml, 'text/xml');
    var points = doc.getElementsByTagName('trkpt');
    var coords = [];
    var elevs = [];
    for (var i = 0; i < points.length; i++) {
      var lat = parseFloat(points[i].getAttribute('lat'));
      var lon = parseFloat(points[i].getAttribute('lon'));
      var eleNode = points[i].getElementsByTagName('ele')[0];
      var ele = eleNode ? parseFloat(eleNode.textContent) : 0;
      coords.push([lat, lon]);
      elevs.push(ele);
    }
    return {coords: coords, elevations: elevs};
  }

  function haversineAccum(coords, upTo, interval) {
    var dist = 0;
    for (var i = interval; i <= upTo; i += interval) {
      dist += haversine(coords[i-interval][0], coords[i-interval][1], coords[i][0], coords[i][1]);
    }
    return dist;
  }

  function loadDay(index) {
    fetch(dayFiles[index])
      .then(function(r) { return r.text(); })
      .then(function(xml) {
        var data = parseGPX(xml);
        var latlngs = data.coords.map(function(c) { return L.latLng(c[0], c[1]); });

        L.polyline(latlngs, {color: '#fff', weight: 6, opacity: 0.6}).addTo(map);
        L.polyline(latlngs, {color: dayColors[index], weight: 3.5, opacity: 0.9, lineCap: 'round'}).addTo(map);

        latlngs.forEach(function(ll) { bounds.extend(ll); });

        var dayDist = 0;
        var dayGain = 0;
        var prevElev = data.elevations[0];
        for (var i = 1; i < data.coords.length; i++) {
          dayDist += haversine(data.coords[i-1][0], data.coords[i-1][1], data.coords[i][0], data.coords[i][1]);
          var elevDiff = data.elevations[i] - prevElev;
          if (elevDiff > 0) dayGain += elevDiff;
          prevElev = data.elevations[i];
        }

        var sampleInterval = Math.max(1, Math.floor(data.coords.length / 200));
        var sampledElevs = [];
        for (var i = 0; i < data.coords.length; i += sampleInterval) {
          sampledElevs.push(data.elevations[i]);
        }

        dayData[index] = {dist: dayDist, gain: dayGain, elevations: sampledElevs};
        loadedCount++;

        if (loadedCount === 3) finalize();
      });
  }

  function finalize() {
    // Assemble elevation data in correct day order
    var allElevations = [];
    var dayBoundaries = [];
    var totalDist = 0;
    var totalGain = 0;
    var maxElev = 0;
    for (var d = 0; d < 3; d++) {
      dayBoundaries.push(allElevations.length);
      for (var i = 0; i < dayData[d].elevations.length; i++) {
        allElevations.push(dayData[d].elevations[i]);
        if (dayData[d].elevations[i] > maxElev) maxElev = dayData[d].elevations[i];
      }
      totalDist += dayData[d].dist;
      totalGain += dayData[d].gain;
    }

    map.fitBounds(bounds, {padding: [30, 30]});

    // Bivvy marker
    var campIcon = L.divIcon({
      className: 'route-marker',
      html: '<div class="route-marker-dot camp-marker"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    L.marker([bivvy.lat, bivvy.lng], {icon: campIcon}).addTo(map)
      .bindPopup('<div class="munro-popup"><strong>' + bivvy.label + '</strong><br>' + bivvy.elev + '</div>');

    document.getElementById('total-dist').textContent = totalDist.toFixed(0);
    document.getElementById('max-elev').textContent = Math.round(maxElev) + 'm';
    document.getElementById('total-gain').textContent = Math.round(totalGain) + 'm';

    drawElevation(allElevations, dayBoundaries, maxElev);
  }

  function drawElevation(allElevations, dayBoundaries, maxElev) {
    var canvas = document.getElementById('elevation-chart');
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    var W = rect.width;
    var H = rect.height;

    var minElev = Math.min.apply(null, allElevations) - 50;
    var maxE = maxElev + 50;
    var n = allElevations.length;

    ctx.fillStyle = '#f8f6f3';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = '#e0ddd8';
    ctx.lineWidth = 0.5;
    ctx.font = '11px Inter, sans-serif';
    ctx.fillStyle = '#999';
    ctx.textAlign = 'left';
    var elevSteps = [200, 400, 600, 800, 1000, 1200];
    elevSteps.forEach(function(e) {
      if (e >= minElev && e <= maxE) {
        var y = H - 25 - ((e - minElev) / (maxE - minElev)) * (H - 45);
        ctx.beginPath();
        ctx.moveTo(45, y);
        ctx.lineTo(W - 10, y);
        ctx.stroke();
        ctx.fillText(e + 'm', 2, y + 4);
      }
    });

    dayBoundaries.push(n);

    for (var d = 0; d < 3; d++) {
      var start = dayBoundaries[d];
      var end = dayBoundaries[d + 1];
      if (start >= end) continue;

      ctx.beginPath();
      var firstX = 45 + (start / (n - 1)) * (W - 55);
      var firstY = H - 25 - ((allElevations[start] - minElev) / (maxE - minElev)) * (H - 45);
      ctx.moveTo(firstX, H - 25);
      ctx.lineTo(firstX, firstY);
      for (var i = start; i < end; i++) {
        var x = 45 + (i / (n - 1)) * (W - 55);
        var y = H - 25 - ((allElevations[i] - minElev) / (maxE - minElev)) * (H - 45);
        ctx.lineTo(x, y);
      }
      var lastX = 45 + ((end - 1) / (n - 1)) * (W - 55);
      ctx.lineTo(lastX, H - 25);
      ctx.closePath();
      ctx.fillStyle = dayColors[d] + '18';
      ctx.fill();

      ctx.beginPath();
      for (var i = start; i < end; i++) {
        var x = 45 + (i / (n - 1)) * (W - 55);
        var y = H - 25 - ((allElevations[i] - minElev) / (maxE - minElev)) * (H - 45);
        if (i === start) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = dayColors[d];
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    var dayLabels = ['Night Hike', 'Grey Corries & Aonachs', 'Morning Walk'];
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    for (var d = 0; d < 3; d++) {
      var mid = (dayBoundaries[d] + dayBoundaries[d + 1]) / 2;
      var x = 45 + (mid / (n - 1)) * (W - 55);
      ctx.fillStyle = dayColors[d];
      ctx.fillText(dayLabels[d], x, H - 5);
    }
  }

  for (var i = 0; i < 3; i++) loadDay(i);
})();
</script>
