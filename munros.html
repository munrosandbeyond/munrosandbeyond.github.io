// Build lookup of completed names
var completedNames = {};
completed.forEach(function(m) { completedNames[m.name] = true; });

// Init map

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {

// Custom icons

  className: 'munro-marker completed-marker',

  iconAnchor: [7, 7]
});

var remainingIcon = L.divIcon({
  className: 'munro-marker remaining-marker',
  html: '<div class="marker-dot remaining"></div>',
  iconSize: [12, 12],
  iconAnchor: [6, 6]
});

// Plot completed munros
completed.forEach(function(m) {
  var dateStr = new Date(m.date).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  var popup = '<div class="munro-popup"><strong>' + m.name + '</strong><br><span class="popup-date">' + dateStr + '</span>';
  if (m.note) popup += '<br><em>' + m.note + '</em>';
  if (m.blog) popup += '<br><a href="' + m.blog + '" class="popup-blog-link">Read the blog &rarr;</a>';
  popup += '</div>';
  L.marker([m.lat, m.lng], {icon: completedIcon}).addTo(map).bindPopup(popup);
});

// Plot remaining munros
allMunros.forEach(function(m) {
  if (!completedNames[m.name]) {
    L.marker([m.lat, m.lng], {icon: remainingIcon}).addTo(map)
      .bindPopup('<div class="munro-popup"><strong>' + m.name + '</strong><br><span class="popup-remaining">Not yet climbed</span></div>');
  }
});

// Render list
function renderList(sortBy) {
  var sorted = completed.slice().sort(function(a, b) {
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    return new Date(b.date) - new Date(a.date);
  });

  var html = '';
  sorted.forEach(function(m) {
    var dateStr = new Date(m.date).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
    html += '<div class="munro-list-item">';
    html += '<span class="munro-list-name">' + m.name + '</span>';
    html += '<span class="munro-list-date">' + dateStr + '</span>';
    if (m.note) html += '<span class="munro-list-note">' + m.note + '</span>';
    html += '</div>';
  });
  document.getElementById('munros-list').innerHTML = html;
}

renderList('date');

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderList(btn.dataset.sort);
  });
});

// Progress over time chart
(function drawProgressChart() {
  var sorted = completed.slice().sort(function(a, b) {
    return new Date(a.date) - new Date(b.date);
  });

  // Build cumulative data
  var points = [];
  var count = 0;
  var lastDate = '';
  sorted.forEach(function(m) {
    count++;
    // Group same-day summits
    if (m.date !== lastDate) {
      points.push({date: new Date(m.date), count: count});
    } else {
      points[points.length - 1].count = count;
    }
    lastDate = m.date;
  });

  var canvas = document.getElementById('progress-chart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var W = rect.width;
  var H = rect.height;
  var padL = 45, padR = 15, padT = 20, padB = 35;
  var cW = W - padL - padR;
  var cH = H - padT - padB;

  var minDate = points[0].date.getTime();
  var maxDate = points[points.length - 1].date.getTime();
  var maxCount = 282;

  function xPos(date) { return padL + ((date.getTime() - minDate) / (maxDate - minDate)) * cW; }
  function yPos(val) { return padT + cH - (val / maxCount) * cH; }

  // Background
  ctx.fillStyle = '#f8f6f3';
  ctx.fillRect(0, 0, W, H);

  // Target line (282)
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, yPos(282));
  ctx.lineTo(W - padR, yPos(282));
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '10px Inter, sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText('282', 4, yPos(282) + 4);

  // Horizontal grid
  ctx.strokeStyle = '#e8e4df';
  ctx.lineWidth = 0.5;
  [50, 100, 150, 200, 250].forEach(function(v) {
    ctx.beginPath();
    ctx.moveTo(padL, yPos(v));
    ctx.lineTo(W - padR, yPos(v));
    ctx.stroke();
    ctx.fillStyle = '#bbb';
    ctx.fillText(v, 4, yPos(v) + 4);
  });

  // Year labels
  ctx.textAlign = 'center';
  ctx.fillStyle = '#999';
  ctx.font = '11px Inter, sans-serif';
  var startYear = points[0].date.getFullYear();
  var endYear = points[points.length - 1].date.getFullYear();
  for (var y = startYear; y <= endYear; y++) {
    var d = new Date(y, 0, 1);
    if (d.getTime() >= minDate && d.getTime() <= maxDate) {
      var x = xPos(d);
      ctx.fillText(y, x, H - 8);
      ctx.strokeStyle = '#e8e4df';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(x, padT);
      ctx.lineTo(x, padT + cH);
      ctx.stroke();
    }
  }

  // Filled area
  ctx.beginPath();
  ctx.moveTo(xPos(points[0].date), yPos(0));
  points.forEach(function(p) {
    ctx.lineTo(xPos(p.date), yPos(p.count));
  });
  ctx.lineTo(xPos(points[points.length - 1].date), yPos(0));
  ctx.closePath();
  var grad = ctx.createLinearGradient(0, padT, 0, padT + cH);
  grad.addColorStop(0, 'rgba(196, 90, 60, 0.25)');
  grad.addColorStop(1, 'rgba(196, 90, 60, 0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  points.forEach(function(p, i) {
    if (i === 0) ctx.moveTo(xPos(p.date), yPos(p.count));
    else ctx.lineTo(xPos(p.date), yPos(p.count));
  });
  ctx.strokeStyle = '#c45a3c';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Current count dot
  var last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(xPos(last.date), yPos(last.count), 5, 0, Math.PI * 2);
  ctx.fillStyle = '#c45a3c';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Label
  ctx.font = 'bold 12px Inter, sans-serif';
  ctx.fillStyle = '#c45a3c';
  ctx.textAlign = 'right';
  ctx.fillText(last.count, xPos(last.date) - 10, yPos(last.count) + 4);
})();

})();
